AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: baba pet care - invoice PDF API (FastAPI on Lambda Function URL)

Parameters:
  ApiKey:
    Type: String
    NoEcho: true
    Description: Shared secret clients send in the X-API-Key header.
  AllowedOrigins:
    Type: String
    Default: "https://babapetcare.com,https://www.babapetcare.com,http://localhost:3000"
    Description: Comma-separated list of origins for CORS.

Resources:
  InvoiceFn:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - arm64
      MemorySize: 512
      Timeout: 15
      Environment:
        Variables:
          INVOICE_API_KEY: !Ref ApiKey
          INVOICE_CORS_ORIGINS: !Ref AllowedOrigins
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "https://babapetcare.com"
            - "https://www.babapetcare.com"
            - "http://localhost:3000"
          AllowMethods:
            - "POST"
            - "GET"
          AllowHeaders:
            - "content-type"
            - "x-api-key"
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: latest

  # SAM auto-generates a lambda:InvokeFunctionUrl permission for AuthType=NONE,
  # but this AWS account additionally requires lambda:InvokeFunction or the
  # Function URL returns 403 AccessDeniedException on every request. Without
  # this resource the Lambda console surfaces:
  #   "Your function URL auth type is NONE, but is missing permissions required
  #    for public access. … grant lambda:invokeFunction and lambda:invokeFunctionUrl
  #    permissions to all principals (*)."
  InvoiceFnPublicInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InvoiceFn
      Action: lambda:InvokeFunction
      Principal: "*"

Outputs:
  InvoiceUrl:
    Description: Public Function URL for the invoice API.
    Value: !GetAtt InvoiceFnUrl.FunctionUrl
